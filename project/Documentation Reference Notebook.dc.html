<style>
  :root{
    --ink:#222226; --muted:#6A6A6F; --faint:#A4A4A0;
    --page:#FBFBF9; --paper:#E7E7E3; --soft:#F1F1EE; --softer:#F7F7F4;
    --rule:#E3E3DE; --line:#D4D4CF;
    /* monochrome neutrals + a muted-canary accent */
    --accent:#B5862A; --accent2:#E6C658; --accentsoft:#E8D6A2;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  body{ background:var(--paper); color:var(--ink);
    font-family:'IBM Plex Sans',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }

  @page{ size:A4; margin:0; }

  @media screen{
    body{ padding:30px 0 60px; }
    .sheet{ margin:0 auto 20px; box-shadow:0 8px 30px rgba(45,33,12,.16); }
  }
  @media print{
    body{ background:none; padding:0; }
    .sheet{ box-shadow:none !important; margin:0 !important; }
  }

  #loading{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; background:var(--paper); z-index:50; color:var(--muted);
    font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.18em; text-transform:uppercase; }
  #loading .dot{ width:34px; height:34px; border-radius:50%; border:2px solid var(--line);
    border-top-color:var(--accent); animation:spin .9s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Sheet ---------- */
  .sheet{ position:relative; width:210mm; height:297mm; background:var(--page);
    overflow:hidden; break-after:page; page-break-after:always; }
  .sheet:last-child{ break-after:auto; page-break-after:auto; }
  .content{ position:absolute; left:18mm; right:18mm; top:17mm; }
  .hdr{ position:absolute; left:18mm; right:18mm; top:9.5mm; display:flex; align-items:flex-end;
    justify-content:space-between; border-bottom:1px solid var(--rule); padding-bottom:2.4mm; }
  .hdr .l{ font-family:'IBM Plex Mono'; font-size:7pt; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); }
  .hdr .r{ font-family:'Spectral'; font-style:italic; font-size:9pt; color:var(--muted); }
  .ftr{ position:absolute; left:18mm; right:18mm; bottom:9mm; display:flex; align-items:center;
    justify-content:space-between; border-top:1px solid var(--rule); padding-top:2.2mm; }
  .ftr .l{ font-family:'IBM Plex Mono'; font-size:6.8pt; letter-spacing:.06em; color:var(--faint); }
  .ftr .pg{ font-family:'IBM Plex Mono'; font-size:8.5pt; color:var(--accent); }

  /* ---------- Cover ---------- */
  .sheet.cover{ background:#1E1E21; color:#ECECE6; }
  .cover-inner{ position:absolute; inset:0; display:flex; flex-direction:column; padding:24mm 23mm 22mm; }
  .cover-inner::before{ content:""; position:absolute; inset:11mm; border:1px solid rgba(230,198,88,.20); pointer-events:none; }
  .cover-top{ display:flex; align-items:flex-start; justify-content:space-between; position:relative; z-index:1; }
  .brand-logo{ height:62px; width:auto; filter:brightness(0) invert(1); opacity:.95; }
  .cover-edition{ font-family:'IBM Plex Mono'; font-size:9.5px; letter-spacing:.26em; text-transform:uppercase;
    color:var(--accent2); text-align:right; line-height:1.8; }
  .cover-edition{ font-family:'IBM Plex Mono'; font-size:9.5px; letter-spacing:.26em; text-transform:uppercase;
    color:var(--accent2); text-align:right; line-height:1.8; }
  .cover-mid{ margin-top:auto; position:relative; z-index:1; }
  .cover-kicker{ font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.36em; text-transform:uppercase;
    color:var(--accent2); margin-bottom:20px; }
  .cover-title{ font-family:'Spectral'; font-weight:500; font-size:62px; line-height:1.02; letter-spacing:-.5px;
    margin:0; color:#FAF4E8; max-width:15ch; }
  .cover-title em{ font-style:italic; color:var(--accentsoft); }
  .cover-rule{ width:70mm; height:2px; background:var(--accent2); margin:26px 0 22px; }
  .cover-sub{ font-family:'Spectral'; font-size:15.5px; line-height:1.55; color:#CFCFC8; max-width:62ch; margin:0; }
  .cover-foot{ margin-top:34px; display:flex; gap:30px; flex-wrap:wrap;
    font-family:'IBM Plex Mono'; font-size:9.5px; letter-spacing:.18em; text-transform:uppercase; color:#AEAEA6; }
  .cover-foot b{ color:var(--accent2); font-weight:400; }
  .cover-link{ display:inline-flex; align-items:center; gap:7px; margin-top:22px; font-family:'IBM Plex Mono';
    font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--accent2); text-decoration:none;
    border-bottom:1px solid rgba(230,198,88,.45); padding-bottom:3px; }

  /* ---------- Contents ---------- */
  .content.toc{ }
  .toc-head{ display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:2px solid var(--ink); padding-bottom:10px; margin-bottom:4px; }
  .toc-head h2{ font-family:'Spectral'; font-weight:600; font-size:30px; margin:0; letter-spacing:-.4px; }
  .toc-head .meta{ font-family:'IBM Plex Mono'; font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); }
  .toc-group{ font-family:'IBM Plex Mono'; font-size:9px; letter-spacing:.22em; text-transform:uppercase;
    color:var(--faint); margin:20px 0 2px; }
  .toc-row{ display:flex; align-items:baseline; gap:14px; padding:9.5px 2px; border-bottom:1px solid var(--rule);
    text-decoration:none; color:inherit; cursor:pointer; }
  .toc-row:hover .toc-title{ color:var(--accent); }
  .toc-row:hover .toc-num{ text-decoration:underline; }
  .toc-num{ font-family:'IBM Plex Mono'; font-size:11px; color:var(--accent); width:3.2ch; flex:none; }
  .toc-body{ flex:1; min-width:0; }
  .toc-title{ font-family:'Spectral'; font-weight:500; font-size:16px; color:var(--ink); }
  .toc-desc{ font-size:10px; color:var(--muted); margin-top:2px; line-height:1.4; }
  .toc-pg{ font-family:'IBM Plex Mono'; font-size:11px; color:var(--muted); flex:none; margin-left:auto; }

  /* ---------- Chapter dividers ---------- */
  .content.divider{ display:flex; flex-direction:column; justify-content:center; height:264mm; }
  .divider .dlogo{ height:30px; width:auto; align-self:flex-start; flex:none; opacity:.42; margin-bottom:26px; }
  .divider .kicker{ font-family:'IBM Plex Mono'; font-size:11px; letter-spacing:.32em; text-transform:uppercase;
    color:var(--accent); margin-bottom:8px; }
  .divider .dnum{ font-family:'Spectral'; font-weight:300; font-size:150px; line-height:.82; color:var(--accent); letter-spacing:-2px; }
  .divider .dtitle{ font-family:'Spectral'; font-weight:600; font-size:42px; line-height:1.04; letter-spacing:-.6px;
    margin:14px 0 0; max-width:16ch; color:var(--ink); }
  .divider .drule{ width:54mm; height:2px; background:var(--accent); margin:22px 0; }
  .divider .ddesc{ font-family:'Spectral'; font-size:15px; line-height:1.55; color:var(--muted); max-width:54ch; margin:0; }

  /* ---------- Body typography ---------- */
  .chapter-body{ font-size:10pt; line-height:1.55; color:var(--ink); }
  .chapter-body > :first-child{ margin-top:0 !important; }
  .chapter-body h1{ font-family:'Spectral'; font-weight:600; font-size:23pt; line-height:1.1; margin:0 0 .5em; letter-spacing:-.4px; }
  .chapter-body h2{ font-family:'Spectral'; font-weight:600; font-size:16pt; line-height:1.18; margin:1.4em 0 .42em;
    letter-spacing:-.2px; color:var(--ink); border-bottom:1px solid var(--line); padding-bottom:.2em; }
  .chapter-body h3{ font-family:'Spectral'; font-weight:600; font-size:13pt; margin:1.1em 0 .28em; color:var(--ink); }
  .chapter-body h4{ font-family:'IBM Plex Sans'; font-weight:600; font-size:10pt; letter-spacing:.01em; margin:1em 0 .25em; color:var(--accent); }
  .chapter-body p{ margin:.52em 0; }
  .chapter-body strong{ font-weight:600; color:var(--ink); }
  .chapter-body em{ font-style:italic; }
  .chapter-body a{ color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accentsoft); }
  .chapter-body ul, .chapter-body ol{ margin:.5em 0 .65em 1.25em; padding:0; }
  .chapter-body li{ margin:.2em 0; padding-left:.15em; }
  .chapter-body li::marker{ color:var(--accent); }
  .chapter-body blockquote{ margin:.8em 0; padding:.5em 1em; border-left:3px solid var(--accent);
    background:var(--soft); color:var(--muted); font-style:italic; }
  .chapter-body hr{ border:none; border-top:1px solid var(--rule); margin:1.3em 0; }
  .chapter-body table{ border-collapse:collapse; width:100%; font-size:8.6pt; line-height:1.38; margin:.8em 0; }
  .chapter-body th{ background:var(--ink); color:var(--softer); font-weight:600; text-align:left;
    padding:.5em .62em; font-size:8pt; letter-spacing:.02em; vertical-align:top; }
  .chapter-body td{ border-bottom:1px solid var(--rule); padding:.42em .62em; vertical-align:top; }
  .chapter-body tbody tr:nth-child(even) td{ background:var(--softer); }
  .chapter-body code{ font-family:'IBM Plex Mono'; font-size:8.5pt; background:var(--soft);
    padding:.08em .34em; border-radius:3px; color:var(--accent); }
  .chapter-body pre{ background:#2A251D; color:#EFE7D6; padding:.95em 1.15em; border-radius:7px;
    overflow:hidden; font-size:7.6pt; line-height:1.5; margin:.85em 0; white-space:pre; }
  .chapter-body pre code{ background:none; color:inherit; padding:0; font-size:inherit; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() { return {}; }

  async componentDidMount() {
    if (this._started) return;
    this._started = true;
    await this.waitFor(() => window.marked);
    try { await document.fonts.ready; } catch (e) {}
    try { await this.build(); }
    catch (e) {
      console.error(e);
      const r = document.getElementById('paged-root');
      if (r) r.innerHTML = '<div style="padding:40px;font-family:monospace;color:#A8482A">Build error: ' + e.message + '</div>';
    }
    const ld = document.getElementById('loading');
    if (ld) ld.remove();
  }

  waitFor(cond) {
    return new Promise((res) => {
      let n = 0;
      const t = setInterval(() => { if (cond() || n++ > 300) { clearInterval(t); res(); } }, 40);
    });
  }

  stripLead(md) {
    const lines = md.split(/\r?\n/);
    let i = 0;
    while (i < lines.length && lines[i].trim() === '') i++;
    if (i < lines.length && /^#\s+/.test(lines[i])) {
      lines.splice(i, 1);
      while (i < lines.length && (lines[i].trim() === '' || lines[i].trim() === '---')) lines.splice(i, 1);
    }
    return lines.join('\n');
  }

  esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  // ---- sheet factory ----
  makeSheet(cls) {
    const s = document.createElement('div');
    s.className = 'sheet' + (cls ? ' ' + cls : '');
    this.root.appendChild(s);
    this.page++;
    return s;
  }
  addHdrFtr(sheet, chapterTitle) {
    if (chapterTitle != null) {
      const h = document.createElement('div');
      h.className = 'hdr';
      h.innerHTML = '<span class="l">Documentation Reference Book</span><span class="r">' + this.esc(chapterTitle) + '</span>';
      sheet.appendChild(h);
    }
    const f = document.createElement('div');
    f.className = 'ftr';
    f.innerHTML = '<span class="l">QQ-Studios — Development Documentation</span><span class="pg">' + this.page + '</span>';
    sheet.appendChild(f);
  }
  newContent(sheet, extra) {
    const c = document.createElement('div');
    c.className = 'content' + (extra ? ' ' + extra : '');
    sheet.appendChild(c);
    return c;
  }
  newBodyPage(c) {
    const sheet = this.makeSheet();
    this.addHdrFtr(sheet, c.title);
    this.cur = this.newContent(sheet, 'chapter-body');
    return this.cur;
  }

  fits(content) { return content.getBoundingClientRect().height <= this.limit; }

  place(b, c) {
    let content = this.cur;
    content.appendChild(b);
    if (!this.fits(content) && content.children.length > 1) {
      content.removeChild(b);
      content = this.newBodyPage(c);
      content.appendChild(b);
    }
    if (!this.fits(content)) {
      content.removeChild(b);
      this.splitBlock(b, c);
    }
  }

  freshOrNew(c) {
    return (this.cur && this.cur.children.length === 0) ? this.cur : this.newBodyPage(c);
  }

  splitBlock(b, c) {
    const tag = b.tagName;
    if (tag === 'TABLE') return this.splitTable(b, c);
    if (tag === 'PRE') return this.splitPre(b, c);
    if (tag === 'UL' || tag === 'OL') return this.splitList(b, c);
    const content = this.freshOrNew(c);
    content.appendChild(b);
    this.cur = content;
  }

  splitTable(table, c) {
    const thead = table.querySelector('thead');
    const rows = [].slice.call(table.querySelectorAll('tbody > tr'));
    let content = this.freshOrNew(c);
    const mk = () => {
      const t = table.cloneNode(false);
      if (thead) t.appendChild(thead.cloneNode(true));
      const tb = document.createElement('tbody');
      t.appendChild(tb);
      content.appendChild(t);
      return tb;
    };
    let tb = mk();
    for (const r of rows) {
      tb.appendChild(r);
      if (!this.fits(content) && tb.children.length > 1) {
        tb.removeChild(r);
        content = this.newBodyPage(c);
        tb = mk();
        tb.appendChild(r);
      }
    }
    this.cur = content;
  }

  splitPre(pre, c) {
    const lines = pre.textContent.split('\n');
    let content = this.freshOrNew(c);
    const mk = () => { const p = document.createElement('pre'); content.appendChild(p); return p; };
    let p = mk();
    for (const ln of lines) {
      const prev = p.textContent;
      p.textContent = prev + (prev ? '\n' : '') + ln;
      if (!this.fits(content) && prev !== '') {
        p.textContent = prev;
        content = this.newBodyPage(c);
        p = mk();
        p.textContent = ln;
      }
    }
    this.cur = content;
  }

  splitList(list, c) {
    const items = [].slice.call(list.children);
    let content = this.freshOrNew(c);
    const mk = () => { const l = list.cloneNode(false); content.appendChild(l); return l; };
    let l = mk();
    for (const li of items) {
      l.appendChild(li);
      if (!this.fits(content) && l.children.length > 1) {
        l.removeChild(li);
        content = this.newBodyPage(c);
        l = mk();
        l.appendChild(li);
      }
    }
    this.cur = content;
  }

  addCover() {
    const s = this.makeSheet('cover');
    s.innerHTML =
      '<div class="cover-inner">' +
        '<div class="cover-top">' +
          '<img class="brand-logo" src="assets/qq-logo.png" alt="QQ Studios">' +
          '<div class="cover-edition">Field Guide<br>First Edition<br>2026</div>' +
        '</div>' +
        '<div class="cover-mid">' +
          '<div class="cover-kicker">Development Documentation</div>' +
          '<h1 class="cover-title">The Documentation <em>Reference</em> Book</h1>' +
          '<div class="cover-rule"></div>' +
          '<p class="cover-sub">A complete field guide to software development documentation — every major document type, organized by domain and by lifecycle phase, with delivery-model playbooks, prescriptive stacks, ready-to-use templates, and the practices that keep it all from rotting.</p>' +
          '<div class="cover-foot">' +
            '<span><b>8</b> Chapters</span><span><b>~70</b> Document Types</span>' +
            '<span><b>2</b> Appendices</span><span><b>A–Z</b> Glossary &amp; Index</span>' +
          '</div>' +
          '<a class="cover-link" href="Forms%20Workbook.dc.html">Companion → The Forms Workbook ↗</a>' +
        '</div>' +
      '</div>';
  }

  addToc(CH) {
    const sheet = this.makeSheet();
    this.addHdrFtr(sheet, 'Contents');
    const content = this.newContent(sheet, 'toc');
    let rows = '<div class="toc-head"><h2>Contents</h2><span class="meta">QQ-Studios · 2026</span></div>';
    let lastKind = '';
    for (const c of CH) {
      if (c.kind !== lastKind) {
        rows += '<div class="toc-group">' + (c.kind === 'Appendix' ? 'Appendices' : 'Chapters') + '</div>';
        lastKind = c.kind;
      }
      rows += '<a class="toc-row" href="#' + c.id + '">' +
        '<span class="toc-num">' + c.num + '</span>' +
        '<span class="toc-body"><span class="toc-title">' + this.esc(c.title) + '</span>' +
        '<span class="toc-desc">' + this.esc(c.desc) + '</span></span>' +
        '<span class="toc-pg" data-id="' + c.id + '"></span>' +
      '</a>';
    }
    content.innerHTML = rows;
    content.querySelectorAll('.toc-pg').forEach(s => { this.tocRefs[s.getAttribute('data-id')] = s; });
  }

  addDivider(c) {
    const sheet = this.makeSheet();
    sheet.id = c.id;
    this.addHdrFtr(sheet, null);
    const content = this.newContent(sheet, 'divider');
    content.innerHTML =
      '<img class="dlogo" src="assets/qq-logo.png" alt="QQ Studios">' +
      '<div class="kicker">' + c.kind + ' ' + c.num + '</div>' +
      '<div class="dnum">' + c.num + '</div>' +
      '<h1 class="dtitle">' + this.esc(c.title) + '</h1>' +
      '<div class="drule"></div>' +
      '<p class="ddesc">' + this.esc(c.desc) + '</p>';
    return this.page;
  }

  async build() {
    this.root = document.getElementById('paged-root');
    this.root.innerHTML = '';
    this.page = 0;
    this.limit = 0;
    this.tocRefs = {};

    const CH1 = [
      '## How This Book Is Organized','',
      'A complete field guide to software development documentation — every major document type, organized multiple ways, with lifecycle models, prescriptive stacks for different kinds of organization, ready-to-use templates, and the practices that keep it all from rotting.','',
      '| Chapter | Contents | Use it when |','|---|---|---|',
      '| 2 · Glossary by Domain | ~70 document types grouped by discipline, plus a disambiguation cheat sheet | You need to look up *what a document is* |',
      '| 3 · Lifecycle-Phase Guide | The documents arranged chronologically across 8 phases and 3 parallel tracks | You need to know *when a document is created* |',
      '| 4 · Ownership & Cadence Matrix | One table — owner, audience, trigger, cadence, home — plus health heuristics | You are assigning owners or auditing doc health |',
      '| 5 · Starter Templates | Copy-paste skeletons for the 8 highest-value documents | You need to write one *right now* |',
      '| 6 · Lifecycle Models | How documentation bends across Waterfall, Scrum, Kanban, SSDLC, Data/ML and more | You are working within a delivery model |',
      '| 7 · Stack Recipes | Prescriptive doc stacks for startup, scaling, enterprise, regulated, OSS and data teams | You are deciding what to actually adopt |',
      '| 8 · Best Practices & Anti-Patterns | Writing, maintenance and review practices, plus a named anti-pattern catalog | You want docs that earn their keep |','',
      '## Three Concepts That Organize Everything','',
      '**1. Documents answer different questions.** Every type exists to answer one dominant question — *why* (business case, BRD), *what* (PRD, stories), *how* (design doc, LLD), *how do I operate it* (runbook), *what happened* (incident report, postmortem), *who decided and why* (ADR, decision log). When two documents seem redundant, check whether they answer different questions — usually they do.','',
      '**2. Frozen records vs. living documents.** Some documents are *records* of a moment — ADRs, RFCs, postmortems, change requests, audit trails. They are never edited after the fact; new reality gets a new record that supersedes the old. Others are *living* — READMEs, runbooks, API specs, risk registers — where staleness is a defect and editing is the job. Most documentation dysfunction traces to confusing these two modes. In regulated environments this distinction becomes legally load-bearing.','',
      '**3. Heaviness should match risk and rhythm.** A two-person startup needs READMEs, a few ADRs, and runbooks. A regulated platform additionally needs SOPs, audit evidence, validation records, and traceability — because regulators ask for them by name. A fast-iterating product documents differently than a fixed-scope waterfall build. The formats here range from one paragraph (ADR) to hundreds of pages (SRS); adopt the lightest format that manages the actual risk at the actual pace of the work.','',
      '## The Universal Minimum','',
      'Under every recipe, model, and methodology, three things are non-negotiable:','',
      '    README      what is this and how do I run it',
      '    ADRs        a record of why we decided what we decided',
      '    Runbooks    how to operate it when it matters','',
      'Everything else in this book is added in response to a specific, felt problem — never adopted because a framework said so. The goal is never "complete documentation." The goal is documentation a reader trusts, finds, and acts on correctly. Every doc that does not meet that bar is overhead wearing the costume of diligence.'
    ].join('\n');

    const CH = [
      { id:'ch-1', kind:'Chapter', num:'01', title:'Introduction', md:CH1,
        desc:'How the book is organized — and the three ideas underneath every recipe, model, and template that follows.' },
      { id:'ch-2', kind:'Chapter', num:'02', title:'Glossary by Domain', file:'uploads/development-documentation-glossary.md',
        desc:'About seventy document types grouped by discipline, each with what it is and when to reach for it — plus a disambiguation cheat sheet.' },
      { id:'ch-3', kind:'Chapter', num:'03', title:'Lifecycle-Phase Guide', file:'uploads/lifecycle-phase-guide.md',
        desc:'The same documents arranged chronologically across eight phases and three parallel tracks, with the exit artifact that ends each phase.' },
      { id:'ch-4', kind:'Chapter', num:'04', title:'Ownership & Cadence Matrix', file:'uploads/ownership-cadence-matrix.md',
        desc:'One operational table — owner, audience, trigger, update cadence, home — followed by heuristics for auditing documentation health.' },
      { id:'ch-5', kind:'Chapter', num:'05', title:'Starter Templates', file:'uploads/starter-templates.md',
        desc:'Copy-paste skeletons for the eight highest-leverage documents, with inline guidance you delete as you fill them in.' },
      { id:'ch-6', kind:'Chapter', num:'06', title:'Lifecycle Models', file:'uploads/lifecycle-models.md',
        desc:'How documentation bends across ten delivery models — from Waterfall to the incident loop to open source — and how to pick one.' },
      { id:'ch-7', kind:'Chapter', num:'07', title:'Stack Recipes', file:'uploads/stack-recipes.md',
        desc:'Prescriptive documentation stacks for six kinds of team, from the early-stage startup to the regulated platform.' },
      { id:'ch-8', kind:'Chapter', num:'08', title:'Best Practices & Anti-Patterns', file:'uploads/best-practices-antipatterns.md',
        desc:'Writing, maintenance, and review practices that keep docs alive — plus a catalog of the named ways documentation goes wrong.' },
      { id:'ap-a', kind:'Appendix', num:'A', title:'Glossary of Terms', file:'uploads/glossary-of-terms.md',
        desc:'A flat A–Z reference: every document type, methodology, acronym, and concept in the book, defined in a sentence or two.' },
      { id:'ap-b', kind:'Appendix', num:'B', title:'Index', file:'uploads/index.md',
        desc:'An alphabetical map of terms to where they appear across the chapters and the glossary.' }
    ];

    this.addCover();
    const pm = this.root.firstElementChild.getBoundingClientRect().height / 297;
    this.limit = Math.round(264 * pm) - 8;
    this.addToc(CH);

    const startMap = {};
    for (const c of CH) {
      let body = c.md;
      if (!body) {
        try { body = await (await fetch(c.file)).text(); }
        catch (e) { body = '*Could not load ' + c.file + '*'; }
      }
      body = this.stripLead(body);
      const tmp = document.createElement('div');
      tmp.innerHTML = window.marked.parse(body, { gfm: true });

      startMap[c.id] = this.addDivider(c);
      this.newBodyPage(c);
      const blocks = [].slice.call(tmp.children);
      for (const b of blocks) this.place(b, c);
    }

    for (const id in this.tocRefs) {
      this.tocRefs[id].textContent = startMap[id] || '';
    }
  }
}
</script>
