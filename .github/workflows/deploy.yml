# Deploys to Vercel production after CI passes on main.
#
# One-time setup (after you've imported the repo once at https://vercel.com/new):
#   Repo → Settings → Secrets and variables → Actions → New repository secret:
#     VERCEL_TOKEN       - https://vercel.com/account/tokens
#     VERCEL_ORG_ID      - Vercel → Account/Team Settings (or .vercel/project.json after `vercel link`)
#     VERCEL_PROJECT_ID  - Vercel → Project → Settings → General (or .vercel/project.json)
#   The NEXT_PUBLIC_SUPABASE_* values live in the Vercel project's Environment
#   Variables (set during import); `vercel pull` fetches them, so they are NOT
#   GitHub secrets.

name: Deploy

on:
  # Run only after the CI workflow finishes successfully on main.
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  # Allow manual redeploys from the Actions tab.
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    # workflow_run fires on success and failure; only proceed on success.
    # (workflow_dispatch has no workflow_run payload, so allow that too.)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy the exact commit CI validated (head of the triggering run).
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings + env
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build (production)
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
